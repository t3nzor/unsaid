# Copy this to ~/.config/unsaid/config.toml and replace the placeholder.
# Keep the real token out of git.

[huggingface]
token = "hf_your_token_here"

[unsaid]
# Editable text that seeds the buffer at startup. Prepended to the model's
# context and included in surprisal. Overridden by --preamble on the command line.
preamble = ""
