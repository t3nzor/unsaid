# Copy this to ~/.config/unsaid/config.toml and replace the placeholder.
# Keep the real token out of git.

[huggingface]
token = "hf_your_token_here"

[unsaid]
# Hidden text prepended to the model's context for every completion
# (a system / preamble prompt). Conditions both the live TUI and --prompt
# runs. Empty by default. Overridden by --preamble on the command line.
preamble = ""
